<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔術方塊</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      z-index: 10;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 20px;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 1px;
    }
    button {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 12px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }
    button:hover {
      background-color: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
    .controls-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 5px;
      margin-bottom: 5px;
    }
    #message {
      margin-top: 5px;
      font-size: 12px;
      color: #aaa;
      max-width: 800px;
      line-height: 1.4;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    a.back-link {
      color: #888;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-size: 14px;
      transition: color 0.2s;
    }
    a.back-link:hover {
      color: #fff;
    }
    @media (min-width: 768px) {
      #ui-container {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
      .controls-row {
        margin: 0;
      }
      #message {
        position: absolute;
        bottom: -40px;
        left: 20px;
        color: #fff;
        background: rgba(0,0,0,0.6);
        padding: 5px 10px;
        border-radius: 4px;
        pointer-events: none;
      }
      #canvas-container {
        margin-top: 0;
      }
    }
    @media (max-width: 767px) {
      .top-bar {
        margin-bottom: 10px;
      }
      button {
        flex: 1;
      }
      .controls-row {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
    <div id="ui-container">
    <div class="top-bar">
      <div class="header-left">
        <a href="../index.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          返回
        </a>
        <h2>魔術方塊</h2>
      </div>
    </div>
    <div class="controls-row">
      <button id="btn-shuffle">打亂</button>
      <button id="btn-solve">提示 / 求解</button>
      <button id="btn-blank">自訂 (空白) 魔方</button>
      <button id="btn-reset">重置為已解決</button>
    </div>
    <div id="message">拖曳空白處旋轉視角。在魔方表面拖曳以旋轉某一面。</div>
  </div>

  <div id="canvas-container"></div>

  <!-- Include Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Include OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Include Tween.js for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

  <!-- Include cubejs -->
  <script src="cube.js"></script>
  <script src="solve.js"></script>

  <!-- Main logic -->
  <script src="main.js"></script>
</body>
</html>
