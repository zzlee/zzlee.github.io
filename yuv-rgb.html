<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUV 轉換 RGB 工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="min-h-screen p-8 text-gray-800">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">YUV 到 RGB 轉換工具</h1>
                <a href="index.html" class="text-sm text-blue-600 hover:underline">返回首頁</a>
            </div>

            <p class="text-gray-600 mb-8">
                直接在瀏覽器端將純 YUV 檔案轉換為可視的 RGB 影像。所有處理都在本地端完成，無需上傳至伺服器。
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Control Panel -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">選擇 YUV 檔案</label>
                        <input type="file" id="fileInput" accept=".yuv,application/octet-stream"
                            class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-md file:border-0
                            file:text-sm file:font-semibold
                            file:bg-blue-50 file:text-blue-700
                            hover:file:bg-blue-100 transition-colors" />
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">寬度 (Width)</label>
                            <input type="number" id="widthInput" placeholder="例如: 1920"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">高度 (Height)</label>
                            <input type="number" id="heightInput" placeholder="例如: 1080"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">像素格式 (Pixel Format)</label>
                        <select id="formatSelect" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2">
                            <option value="I420">I420 (YUV420p)</option>
                            <option value="YV12">YV12</option>
                            <option value="NV12">NV12</option>
                            <option value="NV21">NV21</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">色彩空間 (Color Space)</label>
                        <select id="colorSpaceSelect" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2">
                            <option value="BT601">BT.601 (SD)</option>
                            <option value="BT709">BT.709 (HD)</option>
                            <option value="BT2020">BT.2020 (UHD)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">顏色範圍 (Color Range)</label>
                        <select id="rangeSelect" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2">
                            <option value="limited">Limited Range (16-235)</option>
                            <option value="full">Full Range (0-255)</option>
                        </select>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button id="renderBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
                            轉換並顯示
                        </button>
                        <button id="downloadBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            下載圖檔 (PNG)
                        </button>
                    </div>

                    <div id="statusMsg" class="text-sm font-medium mt-2 text-gray-600 hidden"></div>
                </div>

                <!-- Preview Area -->
                <div class="bg-gray-100 rounded-lg p-4 flex items-center justify-center min-h-[300px] border border-gray-200 overflow-hidden">
                    <canvas id="previewCanvas" class="max-w-full max-h-[600px] shadow-sm hidden"></canvas>
                    <div id="placeholder" class="text-gray-400 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>預覽區塊</p>
                        <p class="text-xs mt-1">轉換後的影像將顯示於此</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Placeholder for Logic -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const formatSelect = document.getElementById('formatSelect');
        const colorSpaceSelect = document.getElementById('colorSpaceSelect');
        const rangeSelect = document.getElementById('rangeSelect');
        const renderBtn = document.getElementById('renderBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMsg = document.getElementById('statusMsg');
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');

        function setStatus(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = `text-sm font-medium mt-2 ${isError ? 'text-red-600' : 'text-blue-600'} block`;
        }

        // Clip value between 0 and 255
        const clamp = (val) => Math.min(Math.max(Math.round(val), 0), 255);

        // Retrieve conversion matrix based on Color Space and Range
        function getConversionMatrix(colorSpace, range) {
            let Kr, Kg, Kb;
            // ITU-R BT.601
            if (colorSpace === 'BT601') {
                Kr = 0.299; Kb = 0.114;
            }
            // ITU-R BT.709
            else if (colorSpace === 'BT709') {
                Kr = 0.2126; Kb = 0.0722;
            }
            // ITU-R BT.2020
            else if (colorSpace === 'BT2020') {
                Kr = 0.2627; Kb = 0.0593;
            }
            Kg = 1 - Kr - Kb;

            let Y_scale, Y_offset, C_scale;
            if (range === 'limited') {
                Y_scale = 255 / (235 - 16);
                Y_offset = 16;
                C_scale = 255 / (240 - 16); // Standard UV range is 16-240
            } else {
                // Full Range
                Y_scale = 1.0;
                Y_offset = 0;
                C_scale = 1.0;
            }

            return { Kr, Kg, Kb, Y_scale, Y_offset, C_scale };
        }

        // Convert YUV to RGB for a single pixel
        function yuvToRgb(Y, U, V, matrix) {
            const { Kr, Kg, Kb, Y_scale, Y_offset, C_scale } = matrix;

            // Normalize YUV
            let y = (Y - Y_offset) * Y_scale;
            let u = (U - 128) * C_scale;
            let v = (V - 128) * C_scale;

            // Math logic derived from standard YCbCr to RGB conversion
            // R = Y + 2 * (1 - Kr) * V
            // B = Y + 2 * (1 - Kb) * U
            // G = Y - (2 * Kb * (1 - Kb) / Kg) * U - (2 * Kr * (1 - Kr) / Kg) * V

            let r = y + 2 * (1 - Kr) * v;
            let b = y + 2 * (1 - Kb) * u;
            let g = y - (2 * Kb * (1 - Kb) / Kg) * u - (2 * Kr * (1 - Kr) / Kg) * v;

            return [clamp(r), clamp(g), clamp(b)];
        }

        async function processYUV() {
            if (!fileInput.files.length) {
                setStatus('請選擇一個 YUV 檔案', true);
                return;
            }

            const w = parseInt(widthInput.value);
            const h = parseInt(heightInput.value);

            if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0) {
                setStatus('請輸入有效的寬度和高度', true);
                return;
            }

            const file = fileInput.files[0];
            const format = formatSelect.value;
            const colorSpace = colorSpaceSelect.value;
            const range = rangeSelect.value;

            // Expected file size calculation for 4:2:0 formats
            // Y is w*h, U is (w/2)*(h/2), V is (w/2)*(h/2) => Total 1.5 * w * h
            const expectedSize = (w * h * 3) / 2;

            if (file.size < expectedSize) {
                setStatus(`檔案大小不足。預期至少 ${expectedSize} bytes，但檔案為 ${file.size} bytes。`, true);
                return;
            }

            // Update UI State for Loading
            renderBtn.disabled = true;
            renderBtn.textContent = '處理中...';
            downloadBtn.disabled = true;
            setStatus('正在讀取與轉換檔案...');

            try {
                const buffer = await file.arrayBuffer();
                const view = new Uint8Array(buffer);

                canvas.width = w;
                canvas.height = h;
                const imgData = ctx.createImageData(w, h);
                const data = imgData.data;

                const matrix = getConversionMatrix(colorSpace, range);

                const yPlaneSize = w * h;
                const uvPlaneSize = (w / 2) * (h / 2);

                for (let j = 0; j < h; j++) {
                    for (let i = 0; i < w; i++) {
                        const yIndex = j * w + i;
                        let uIndex, vIndex;

                        const uv_i = Math.floor(i / 2);
                        const uv_j = Math.floor(j / 2);

                        if (format === 'I420') {
                            // YUV420p: Y plane, then U plane, then V plane
                            uIndex = yPlaneSize + (uv_j * (w / 2) + uv_i);
                            vIndex = yPlaneSize + uvPlaneSize + (uv_j * (w / 2) + uv_i);
                        } else if (format === 'YV12') {
                            // Y plane, then V plane, then U plane
                            vIndex = yPlaneSize + (uv_j * (w / 2) + uv_i);
                            uIndex = yPlaneSize + uvPlaneSize + (uv_j * (w / 2) + uv_i);
                        } else if (format === 'NV12') {
                            // Y plane, then interleaved UV plane
                            const uvOffset = yPlaneSize + (uv_j * w) + (uv_i * 2);
                            uIndex = uvOffset;
                            vIndex = uvOffset + 1;
                        } else if (format === 'NV21') {
                            // Y plane, then interleaved VU plane
                            const uvOffset = yPlaneSize + (uv_j * w) + (uv_i * 2);
                            vIndex = uvOffset;
                            uIndex = uvOffset + 1;
                        }

                        const Y = view[yIndex];
                        const U = view[uIndex];
                        const V = view[vIndex];

                        const rgb = yuvToRgb(Y, U, V, matrix);

                        const pixelIndex = (j * w + i) * 4;
                        data[pixelIndex] = rgb[0];     // R
                        data[pixelIndex + 1] = rgb[1]; // G
                        data[pixelIndex + 2] = rgb[2]; // B
                        data[pixelIndex + 3] = 255;    // Alpha
                    }
                }

                ctx.putImageData(imgData, 0, 0);

                placeholder.classList.add('hidden');
                canvas.classList.remove('hidden');
                setStatus('轉換完成！');
                downloadBtn.disabled = false;

            } catch (err) {
                console.error(err);
                setStatus('轉換失敗：' + err.message, true);
            } finally {
                renderBtn.disabled = false;
                renderBtn.textContent = '轉換並顯示';
            }
        }

        renderBtn.addEventListener('click', processYUV);

        downloadBtn.addEventListener('click', () => {
            if (canvas.classList.contains('hidden')) {
                return;
            }

            // Get original filename without extension to use for the downloaded file
            let originalName = 'converted';
            if (fileInput.files.length) {
                const parts = fileInput.files[0].name.split('.');
                parts.pop(); // remove extension
                if (parts.length > 0) {
                    originalName = parts.join('.');
                }
            }

            const dataURL = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `${originalName}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

    </script>
</body>
</html>
